name: Release macOS arm64

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-macos-arm64-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and publish macOS arm64 assets
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-beta."* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build macOS arm64 distributables
        env:
          ALLOW_ADHOC_SIGNING: "1"
          BUILD_ARCHS: "arm64"
          BUILD_CONFIG: "release"
          BUNDLE_ID: "ai.openclaw.mac"
          SKIP_NOTARIZE: "1"
          SKIP_DSYM: "1"
          APP_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          scripts/package-mac-dist.sh

      - name: Build standalone arm64 binary archive
        shell: bash
        run: |
          set -euo pipefail
          cp dist/OpenClaw.app/Contents/MacOS/OpenClaw dist/openclaw-macos-arm64
          chmod +x dist/openclaw-macos-arm64
          tar -czf dist/openclaw-macos-arm64.tar.gz -C dist openclaw-macos-arm64
          shasum -a 256 \
            dist/OpenClaw-"${{ steps.meta.outputs.version }}".zip \
            dist/OpenClaw-"${{ steps.meta.outputs.version }}".dmg \
            dist/openclaw-macos-arm64.tar.gz \
            > dist/checksums-arm64.txt

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-release-assets
          path: |
            dist/OpenClaw-${{ steps.meta.outputs.version }}.zip
            dist/OpenClaw-${{ steps.meta.outputs.version }}.dmg
            dist/openclaw-macos-arm64.tar.gz
            dist/checksums-arm64.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: OpenClaw ${{ steps.meta.outputs.version }} (macOS arm64)
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/OpenClaw-${{ steps.meta.outputs.version }}.zip
            dist/OpenClaw-${{ steps.meta.outputs.version }}.dmg
            dist/openclaw-macos-arm64.tar.gz
            dist/checksums-arm64.txt
